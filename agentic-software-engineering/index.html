<body>
  <div class="reveal">
    <div class="slides">

      <!-- Title -->
      <section>
        <h1>Agentic Software Engineering</h1>
        <p>Working with AI agents that actually get things done</p>
      </section>

      <!-- Agenda -->
      <section data-markdown>
        <textarea data-template>
## Agenda

1. Planning &amp; Specs
2. The Feedback Loop
3. Tooling Configuration
4. Agent Empowerment
5. Security
6. Collaboration Techniques
7. Everything is Context Management
        </textarea>
      </section>

      <!-- Planning & Specs -->
      <section data-markdown>
        <textarea data-template>
## Planning &amp; Specs

- Start with a concrete scope
- Present up-front, let the agent interview you
- Direct it: architecture, security, tech-stack
- Get a final plan — then persist it
        </textarea>
      </section>

      <!-- The Feedback Loop -->
      <section data-markdown>
        <textarea data-template>
## The Feedback Loop

- Give agents relevant correctness signals
- Tests, CI/CD, security scans, dep vulns
- Capture recurring failures in project memory
- Engineering the loop is everything
        </textarea>
      </section>

      <!-- Tooling Configuration -->
      <section data-markdown>
        <textarea data-template>
## Tooling Configuration

- Skills for repeatable workflows
- Agents for parallelizable tasks
- Memory files for pitfalls &amp; domain knowledge
- Commit config to projects; AOS org-wide
        </textarea>
      </section>

      <!-- Agent Empowerment -->
      <section data-markdown>
        <textarea data-template>
## Agent Empowerment

- Agents love CLIs — if none exists, build one
- MCPs are useful but context-heavy
- Aggressively allow safe, non-mutative ops
- Navigate, don't drive &nbsp;_(HOTL &gt; HITL)_
        </textarea>
      </section>

      <!-- Security -->
      <section data-markdown>
        <textarea data-template>
## Security

- Permissionless mode: compromise is _when_, not _if_
- Isolate: devcontainers, hardened Docker, cloud runners
- Vet 3rd-party memory, connector &amp; prompt tools
- When in doubt, leave it out
        </textarea>
      </section>

      <!-- Collaboration Techniques -->
      <section data-markdown>
        <textarea data-template>
## Collaboration Techniques

- Build an Agentic OS for your org
- Project memory lives in-project
- User preferences stay at user level
- Use `@` syntax to load context explicitly
        </textarea>
      </section>

      <!-- Everything is Context Management -->
      <section data-markdown>
        <textarea data-template>
## Everything is Context Management

- Context is a pre-allocated array of strings
- Be intentional about what's in it
- Index memory for easy discovery
- Compaction kills productivity — avoid the dumb zone
        </textarea>
      </section>

      <!-- Closing -->
      <section>
        <h2>Questions?</h2>
      </section>

      <!-- Demos -->
      <section data-markdown>
        <textarea data-template>
## Demos

- E-commerce site from scratch
- Rust-based videogame
        </textarea>
